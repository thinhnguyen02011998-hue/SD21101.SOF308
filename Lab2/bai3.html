<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <div class="container mt-3">
    <!-- Nav tabs -->
    <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#register">Đăng ký</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#login">Đăng nhập</a>
        </li>
        <li class="nav-item">
        </li>
    </ul>

    <!-- Tab panes -->
    <div class="tab-content">
        <div id="register" class="container tab-pane active"><br>
            <!-- Form Đăng ký -->
             <h3>Form Đăng Ký Thông Tin</h3>
                <div class="card blog bg-light">
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Họ và Tên</label>
                            <input class="form-control" placeholder="Nhập họ và Tên">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Nhập Email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="email" class="form-control" placeholder="Nhập số điện thoại">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input class="form-control" placeholder="Nhập mật khẩu">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <input class="form-control" placeholder="Nhập lại mật khẩu">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giới tính:</label>

                            <div class="form-check form-check-inline">
                                <input type="radio" name="gioitinh" id="nam" class="form-check-input" checked>
                                <label for="nam" class="form-check-label">Nam</label>
                            </div>

                            <div class="form-check form-check-inline">
                                <input type="radio" name="gioitinh" id="nu" class="form-check-input">
                                <label for="nu" class="form-check-label">Nữ</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ngôn Ngữ</label>
                            <select class="form-select">
                                <option>Tiếng Việt</option>
                                <option>Tiếng Iran</option>
                                <option>Tiếng Anh</option>
                                <option>Tiếng Trung</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" checked>
                                <label class="form-check-label">Tôi đồng ý với các điều khoảng và điều kiện</label>
                            </div>
                        </div>

                        <div class="row">
                            <p class="card-text">
                                <a href="" class="btn btn-primary">Đăng ký</a>
                            </p>
                        </div>
                    </div>
                </div>
        </div>
        <div id="login" class="container tab-pane fade"><br>
            <!-- Form đăng nhập -->
             <h3>Form Đăng Nhập</h3>
                <div class="card blog bg-light">
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Nhập Email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                        </div>

                        <div class="row">
                            <p class="card-text">
                                <a href="" class="btn btn-primary">Đăng Nhập</a>
                            </p>
                        </div>

                    </div>
                </div>
        </div>
    </div>
</div>
</body>
</html>
