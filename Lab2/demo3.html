<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>

    <div class="container">

        <div class="row">

            <div class="col-sm-6 mt-3">
                <div class="mb-3">
                    <label class="form-label">
                        Email address
                    </label>
                    <input type="email" class="form-control" placeholder="name@example.com" readonly>
                </div>
                <div class="mb-3">
                    <labe class="form-label">
                        Example textarea
                        </label>
                        <textarea class="form-control" rows="3"></textarea>
                </div>

                <form>
                    <div class="form-check">
                        <input type="radio" class="form-check-input" checked>
                        <label class="form-check-label">Option 1</label>
                    </div>
                    <div class="form-check">
                        <input type="radio" class="form-check-input">
                        <label class="form-check-label">Option 2</label>
                    </div>
                    <div class="form-check">
                        <input type="radio" class="form-check-input" disabled>
                        <label class="form-check-label">Option 3</label>
                    </div>
                </form>

            </div>



            <div class="col-sm-6 mt-3">
                <select class="form-select">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>

                <br>

                <form>
                    <label class="form-label">Chọn trình duyệt từ danh sách:</label>
                    <input class="form-control" list="browsers" name="browser">
                    <datalist id="browsers">
                        <option value="Edge">
                        <option value="Firefox">
                        <option value="Chrome">
                        <option value="Opera">
                        <option value="Safari">
                    </datalist>
                </form>

            </div>

        </div>
    </div>
</body>

</html>
