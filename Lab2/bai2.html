<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-sm-6 mt-3">
                <h3>Form Đăng Ký Thông Tin</h3>
                <div class="card blog bg-light">
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Họ và Tên</label>
                            <input class="form-control" placeholder="Nhập họ và Tên">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Nhập Email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="email" class="form-control" placeholder="Nhập số điện thoại">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input class="form-control" placeholder="Nhập mật khẩu">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <input class="form-control" placeholder="Nhập lại mật khẩu">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giới tính:</label>

                            <div class="form-check form-check-inline">
                                <input type="radio" name="gioitinh" id="nam" class="form-check-input" checked>
                                <label for="nam" class="form-check-label">Nam</label>
                            </div>

                            <div class="form-check form-check-inline">
                                <input type="radio" name="gioitinh" id="nu" class="form-check-input">
                                <label for="nu" class="form-check-label">Nữ</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ngôn Ngữ</label>
                            <select class="form-select">
                                <option>Tiếng Việt</option>
                                <option>Tiếng Iran</option>
                                <option>Tiếng Anh</option>
                                <option>Tiếng Trung</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" checked>
                                <label class="form-check-label">Tôi đồng ý với các điều khoảng và điều kiện</label>
                            </div>
                        </div>

                        <div class="row">
                            <p class="card-text text-center">
                                <a href="" class="btn btn-primary">Đăng ký</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-sm-6 mt-3">
                <h3>Form Đăng Nhập</h3>
                <div class="card blog bg-light">
                    <div class="card-body">

                        <!-- <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Nhập Email">
                </div>

                <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                </div>

                <div class="row">
                    <p class="card-text">
                        <a href="" class="btn btn-primary">Đăng Nhập</a>
                    </p>
                </div> -->

                        <form class="was-validated">
                            <div class="mb-3 mt-3">
                                <label for="uname" class="form-label">Họ và tên:</label>
                                <input type="text" class="form-control" id="uname" placeholder="Nhập họ tên" required>
                                <div class="valid-feedback">Hợp lệ</div>
                                <div class="invalid-feedback">Vui lòng điền vào trường này</div>
                            </div>
                            <div class="mb-3">
                                <label for="pwd" class="form-label">Mật khẩu:</label>
                                <input type="password" class="form-control" id="pwd" placeholder="Nhập mật khẩu"
                                    required>
                                <div class="valid-feedback">Hợp lệ</div>
                                <div class="invalid-feedback">Vui lòng điền vào trường này</div>
                            </div>
                            <!-- <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="myCheck" required>
                                <label class="form-check-label" for="myCheck">Đồng ý với các điều khoản</label>
                                <div class="valid-feedback">Hợp lệ</div>
                                <div class="invalid-feedback">Tick vào hộp thoại để xác nhận</div>
                            </div> -->
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </form>

                    </div>
                </div>


            </div>
        </div>
    </div>
</body>

</html>
